services:
  # Backend Web Service
  - type: web
    name: pet-care-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: static_site
    name: pet-care-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://pet-care-backend.onrender.com/api # You can update this after backend is live
